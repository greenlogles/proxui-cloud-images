name: Build Cloud Images

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils xz-utils

      - name: Create output directory
        run: mkdir -p images

      - name: Download Ubuntu Noble
        run: |
          curl -L -o images/ubuntu-noble-amd64.img \
            https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img

      - name: Download Ubuntu Jammy
        run: |
          curl -L -o images/ubuntu-jammy-amd64.img \
            https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img

      - name: Download Debian 12 Bookworm
        run: |
          curl -L -o images/debian-12-bookworm-amd64-orig.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2

      - name: Download Debian 13 Trixie
        run: |
          curl -L -o images/debian-13-trixie-amd64-orig.qcow2 \
            https://cloud.debian.org/images/cloud/trixie/latest/debian-13-generic-amd64.qcow2

      - name: Download Rocky Linux 10
        run: |
          curl -L -o images/rocky-10-amd64-orig.qcow2 \
            https://download.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-LVM.latest.x86_64.qcow2

      - name: Download Rocky Linux 9
        run: |
          curl -L -o images/rocky-9-amd64-orig.qcow2 \
            https://download.rockylinux.org/pub/rocky/9/images/x86_64/Rocky-9-GenericCloud-Base.latest.x86_64.qcow2

      - name: Download Fedora 43
        run: |
          curl -L -o images/fedora-43-amd64-orig.qcow2 \
            https://ftp2.osuosl.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2

      - name: Download Fedora 42
        run: |
          curl -L -o images/fedora-42-amd64-orig.qcow2 \
            https://ftp2.osuosl.org/pub/fedora/linux/releases/42/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-42-1.1.x86_64.qcow2

      - name: Download FreeBSD 15.0 UFS
        run: |
          curl -L -o images/freebsd-15.0-ufs-amd64.qcow2.xz \
            https://download.freebsd.org/releases/VM-IMAGES/15.0-RELEASE/amd64/Latest/FreeBSD-15.0-RELEASE-amd64-ufs.qcow2.xz

      - name: Decompress FreeBSD image
        run: |
          unxz images/freebsd-15.0-ufs-amd64.qcow2.xz
          mv images/freebsd-15.0-ufs-amd64.qcow2 images/freebsd-15.0-ufs-amd64-orig.qcow2

      - name: Convert Ubuntu Noble to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/ubuntu-noble-amd64.img \
            images/ubuntu-noble-amd64.qcow2
          rm images/ubuntu-noble-amd64.img

      - name: Convert Ubuntu Jammy to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/ubuntu-jammy-amd64.img \
            images/ubuntu-jammy-amd64.qcow2
          rm images/ubuntu-jammy-amd64.img

      - name: Convert Debian 12 Bookworm to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/debian-12-bookworm-amd64-orig.qcow2 \
            images/debian-12-bookworm-amd64.qcow2
          rm images/debian-12-bookworm-amd64-orig.qcow2

      - name: Convert Debian 13 Trixie to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/debian-13-trixie-amd64-orig.qcow2 \
            images/debian-13-trixie-amd64.qcow2
          rm images/debian-13-trixie-amd64-orig.qcow2

      - name: Convert Rocky Linux 10 to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/rocky-10-amd64-orig.qcow2 \
            images/rocky-10-amd64.qcow2
          rm images/rocky-10-amd64-orig.qcow2

      - name: Convert Rocky Linux 9 to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/rocky-9-amd64-orig.qcow2 \
            images/rocky-9-amd64.qcow2
          rm images/rocky-9-amd64-orig.qcow2

      - name: Convert Fedora 43 to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/fedora-43-amd64-orig.qcow2 \
            images/fedora-43-amd64.qcow2
          rm images/fedora-43-amd64-orig.qcow2

      - name: Convert Fedora 42 to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/fedora-42-amd64-orig.qcow2 \
            images/fedora-42-amd64.qcow2
          rm images/fedora-42-amd64-orig.qcow2

      - name: Convert FreeBSD 15.0 UFS to compressed qcow2
        run: |
          qemu-img convert -c -f qcow2 -O qcow2 \
            images/freebsd-15.0-ufs-amd64-orig.qcow2 \
            images/freebsd-15.0-ufs-amd64.qcow2
          rm images/freebsd-15.0-ufs-amd64-orig.qcow2

      - name: Generate SHA256 checksums
        run: |
          cd images
          sha256sum *.qcow2 > SHA256SUMS
          cat SHA256SUMS

      - name: Generate release notes
        id: release_notes
        run: |
          cd images
          echo "## Cloud Images" > ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo "Build date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> ../RELEASE_NOTES.md
          echo "Commit: ${{ github.sha }}" >> ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo "### Included Images" >> ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo "| Image | Source |" >> ../RELEASE_NOTES.md
          echo "|-------|--------|" >> ../RELEASE_NOTES.md
          echo "| ubuntu-noble-amd64.qcow2 | Ubuntu 24.04 LTS (Noble Numbat) |" >> ../RELEASE_NOTES.md
          echo "| ubuntu-jammy-amd64.qcow2 | Ubuntu 22.04 LTS (Jammy Jellyfish) |" >> ../RELEASE_NOTES.md
          echo "| debian-12-bookworm-amd64.qcow2 | Debian 12 (Bookworm) |" >> ../RELEASE_NOTES.md
          echo "| debian-13-trixie-amd64.qcow2 | Debian 13 (Trixie) |" >> ../RELEASE_NOTES.md
          echo "| rocky-10-amd64.qcow2 | Rocky Linux 10 (LVM) |" >> ../RELEASE_NOTES.md
          echo "| rocky-9-amd64.qcow2 | Rocky Linux 9 |" >> ../RELEASE_NOTES.md
          echo "| fedora-43-amd64.qcow2 | Fedora 43 |" >> ../RELEASE_NOTES.md
          echo "| fedora-42-amd64.qcow2 | Fedora 42 |" >> ../RELEASE_NOTES.md
          echo "| freebsd-15.0-ufs-amd64.qcow2 | FreeBSD 15.0-RELEASE (UFS) |" >> ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo "### Usage" >> ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo "Import directly to Proxmox:" >> ../RELEASE_NOTES.md
          echo '```bash' >> ../RELEASE_NOTES.md
          echo 'qm importdisk <vmid> <image>.qcow2 <storage>' >> ../RELEASE_NOTES.md
          echo '```' >> ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo "### SHA256 Checksums" >> ../RELEASE_NOTES.md
          echo "" >> ../RELEASE_NOTES.md
          echo '```' >> ../RELEASE_NOTES.md
          cat SHA256SUMS >> ../RELEASE_NOTES.md
          echo '```' >> ../RELEASE_NOTES.md

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=v$(date -u '+%Y%m%d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Cloud Images ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            images/*.qcow2
            images/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update cloud_images.json
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          BASE_URL="https://github.com/greenlogles/proxui-cloud-images/releases/download/${TAG}"
          cat << EOF | python3 -m json.tool > cloud_images.json
          {
            "ubuntu-24.04": {
              "name": "Ubuntu 24.04 LTS (Noble Numbat) (proxui mirror)",
              "url": "${BASE_URL}/ubuntu-noble-amd64.qcow2"
            },
            "ubuntu-22.04": {
              "name": "Ubuntu 22.04 LTS (Jammy Jellyfish) (proxui mirror)",
              "url": "${BASE_URL}/ubuntu-jammy-amd64.qcow2"
            },
            "debian-12": {
              "name": "Debian 12 (Bookworm) (proxui mirror)",
              "url": "${BASE_URL}/debian-12-bookworm-amd64.qcow2"
            },
            "debian-13": {
              "name": "Debian 13 (Trixie) (proxui mirror)",
              "url": "${BASE_URL}/debian-13-trixie-amd64.qcow2"
            },
            "rocky-10": {
              "name": "Rocky Linux 10 LVM (proxui mirror)",
              "url": "${BASE_URL}/rocky-10-amd64.qcow2"
            },
            "rocky-9": {
              "name": "Rocky Linux 9 (proxui mirror)",
              "url": "${BASE_URL}/rocky-9-amd64.qcow2"
            },
            "fedora-43": {
              "name": "Fedora 43 (proxui mirror)",
              "url": "${BASE_URL}/fedora-43-amd64.qcow2"
            },
            "fedora-42": {
              "name": "Fedora 42 (proxui mirror)",
              "url": "${BASE_URL}/fedora-42-amd64.qcow2"
            },
            "freebsd-15.0": {
              "name": "FreeBSD 15.0-RELEASE UFS (proxui mirror)",
              "url": "${BASE_URL}/freebsd-15.0-ufs-amd64.qcow2"
            }
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud_images.json
          git commit -m "Update cloud_images.json for ${TAG} [skip ci]"
          git push
